<title>54일 묵주기도</title>
<style>
  :root{
    --bg:#f6f3ee;
    --card:#ffffff;
    --ink:#2c2a33;
    --muted:#8a8592;
    --line:#e7e1d8;
    --primary:#5b4a9e;      /* 청원 - 보라 */
    --primary-soft:#efeafb;
    --thanks:#b8863b;       /* 감사 - 금빛 */
    --thanks-soft:#f7eeda;
    --done:#3f9a6d;         /* 완료 */
    --done-soft:#e3f3ea;
    --miss:#cf5b52;         /* 놓침 */
    --miss-soft:#fbe8e6;
    --today-ring:#5b4a9e;
    --shadow:0 6px 22px rgba(50,40,80,.10);
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.65; -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  /* ---------- Header ---------- */
  header{
    text-align:center; padding:26px 16px 10px;
    background:linear-gradient(160deg,#4a3c86,#6a5ab0);
    color:#fff; border-radius:0 0 26px 26px;
    box-shadow:var(--shadow);
  }
  header .cross{font-size:24px;opacity:.9}
  header h1{margin:6px 0 2px;font-size:21px;font-weight:800;letter-spacing:-.5px}
  header .sub{font-size:12.5px;opacity:.85;margin-bottom:14px}
  .progress-ring{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:6px}
  .prog-num{font-size:34px;font-weight:800;line-height:1}
  .prog-num small{font-size:14px;font-weight:600;opacity:.8}
  .phase-pill{
    display:inline-block;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;
    background:rgba(255,255,255,.18);
  }
  .bar{height:8px;background:rgba(255,255,255,.22);border-radius:99px;margin:14px 4px 4px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:#ffd98a;border-radius:99px;transition:width .5s}

  /* ---------- Sections ---------- */
  section{margin-top:20px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  h2.title{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  h2.title .dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}

  /* ---------- Intention ---------- */
  .intent textarea{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font:inherit;
    resize:vertical;min-height:58px;color:var(--ink);background:#fbfaf7;
  }
  .intent textarea:focus{outline:none;border-color:var(--primary)}
  .intent .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* ---------- Calendar grid ---------- */
  .legend{display:flex;flex-wrap:wrap;gap:10px 14px;font-size:12px;color:var(--muted);margin-bottom:14px}
  .legend span{display:flex;align-items:center;gap:5px}
  .swatch{width:13px;height:13px;border-radius:4px;display:inline-block;border:1px solid var(--line)}
  .grp-label{font-size:12px;font-weight:800;color:var(--muted);margin:14px 2px 8px;letter-spacing:.3px}
  .grp-label.first{margin-top:2px}
  .grid{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:5px}
  .cell{
    aspect-ratio:1/1;min-width:0;border-radius:9px;border:1.5px solid var(--line);background:#fbfaf7;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;position:relative;
    transition:transform .08s;
  }
  .cell:active{transform:scale(.9)}
  .cell .mk{font-size:10px;line-height:1;margin-top:1px}
  .cell.done{background:var(--done-soft);border-color:var(--done);color:var(--done)}
  .cell.miss{background:var(--miss-soft);border-color:var(--miss);color:var(--miss)}
  .cell.today{border-color:var(--today-ring);border-width:2.5px;color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .cell.today.done{color:var(--done);border-color:var(--done);box-shadow:0 0 0 3px var(--done-soft)}
  .cell.future{opacity:.55}
  .cell.thanks{}
  .grid.thankscol .cell.done{background:var(--thanks-soft);border-color:var(--thanks);color:var(--thanks)}

  /* ---------- Buttons ---------- */
  .btn{
    display:block;width:100%;border:none;border-radius:14px;padding:15px;font:inherit;font-weight:800;
    font-size:16px;cursor:pointer;text-align:center;
  }
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 16px rgba(91,74,158,.32)}
  .btn-primary:active{opacity:.9}
  .btn-thanks{background:var(--thanks)}
  .btn-ghost{background:transparent;color:var(--muted);font-weight:700;font-size:14px;box-shadow:none}
  .btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
  .btn-done{background:var(--done);color:#fff;box-shadow:0 6px 16px rgba(63,154,109,.3)}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{margin:0}

  /* ---------- Prayer modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(30,25,50,.5);z-index:40;display:none;
    backdrop-filter:blur(2px);
  }
  .overlay.open{display:block}
  .sheet{
    position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto;
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1);
    display:flex;flex-direction:column;
  }
  .sheet.open{transform:translateY(0)}
  .sheet-head{
    position:sticky;top:0;z-index:2;background:linear-gradient(160deg,#4a3c86,#6a5ab0);color:#fff;
    padding:16px;display:flex;align-items:center;justify-content:space-between;
  }
  .sheet-head .x{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer}
  .sheet-head .lbl{font-size:13px;opacity:.9}
  .sheet-head .lbl b{font-size:17px;display:block;margin-top:2px}
  .sheet-body{padding:16px;max-width:520px;margin:0 auto;width:100%}

  .verse{
    background:linear-gradient(135deg,#fff8e9,#fdf1d6);border:1px solid #f0dfae;border-radius:16px;
    padding:20px;text-align:center;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .verse .q{font-size:26px;color:var(--thanks);line-height:0;height:14px;display:block}
  .verse p{font-size:17px;font-weight:600;margin:6px 0 8px;color:#4a3c1a}
  .verse .ref{font-size:13px;font-weight:800;color:var(--thanks)}
  .verse .again{margin-top:10px;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline}

  .step{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(50,40,80,.06)}
  .step .k{font-size:12px;font-weight:800;color:var(--primary);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .step .k .beads{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:0;text-transform:none}
  .step .txt{font-size:15.5px;white-space:pre-line}
  .step .txt.pray{color:#3a3450}
  .myst-list{list-style:none;padding:0;margin:8px 0 0}
  .myst-list li{padding:12px 0;border-top:1px dashed var(--line);font-size:15px}
  .myst-list li:first-child{border-top:none}
  .mi-head{display:flex;gap:10px}
  .mi-head b{color:var(--primary);flex:0 0 auto}
  .mi-medit{font-size:13.5px;color:#6a6577;line-height:1.7;margin:7px 0 0 0;padding:10px 12px;background:#faf8f3;border-radius:10px;border-left:3px solid var(--primary-soft)}
  .mi-ref{display:inline-block;font-size:12px;font-weight:800;color:var(--primary);margin-right:7px;background:var(--primary-soft);padding:1px 7px;border-radius:6px}
  .grid.thankscol ~ *{}
  .accordion .txt{display:none;margin-top:8px}
  .accordion.open .txt{display:block}
  .accordion .k{cursor:pointer;justify-content:space-between;margin-bottom:0}
  .accordion .k .chev{transition:transform .2s}
  .accordion.open .k .chev{transform:rotate(180deg)}

  .finish{margin:6px 0 40px}
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#2c2a33;color:#fff;padding:13px 20px;border-radius:999px;font-size:14px;font-weight:700;
    opacity:0;transition:.3s;z-index:80;pointer-events:none;box-shadow:var(--shadow)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .muted-note{font-size:12px;color:var(--muted);text-align:center;margin-top:6px}
  .footer{text-align:center;font-size:11.5px;color:var(--muted);margin-top:26px;line-height:1.7}
  .setup{padding:12px 0}
  .setup label{font-size:14px;font-weight:700;display:block;margin-bottom:8px}
  .setup input[type=date]{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font:inherit;background:#fbfaf7}
  .done-badge{font-size:13px;color:var(--done);font-weight:800;text-align:center;padding:8px}
</style>
</head>
<body>

<header>
  <div class="cross">✝</div>
  <h1>54일 묵주기도</h1>
  <div class="sub">청원 27일 · 감사 27일 노베나</div>
  <div class="progress-ring">
    <div class="prog-num"><span id="doneCount">0</span><small> / 54일</small></div>
    <span class="phase-pill" id="phasePill">시작 전</span>
  </div>
  <div class="bar"><i id="progFill"></i></div>
</header>

<div class="wrap">

  <!-- 오늘의 기도 시작 -->
  <section>
    <div class="card">
      <div id="todayInfo"></div>
      <button class="btn btn-primary" id="startBtn" style="margin-top:14px">오늘의 기도 시작 🙏</button>
      <div class="muted-note" id="startNote"></div>
    </div>
  </section>

  <!-- 나의 지향 -->
  <section>

  glory:"영광이 성부와 성자와 성령께, 처음과 같이 이제와 항상 영원히. 아멘.",
  salvation:"예수님, 저희 죄를 용서하시며, 저희를 지옥 불에서 구하시고, 연옥 영혼을 돌보시며, 가장 버림받은 영혼을 돌보소서. 아멘.",
  hailQueen:"자비로우신 어머니, 저희 생명이시며 기쁨이시며 희망이신 여왕이시여, 하례하나이다. 귀양살이하는 하와의 자손들이 성모님께 부르짖으며, 이 눈물의 골짜기에서 성모님께 슬피 우나이다. 저희를 위하여 빌으시는 어머니, 인자하신 눈을 저희에게 돌리시고, 이 귀양살이 끝날 때에 태중의 아드님이신 복되신 예수님을 저희에게 보여 주소서. 너그러우시고 자애로우시며 아름다우신 동정 마리아님. 아멘."
};

/* =========================================================
   상태 저장
   ========================================================= */
const KEY = "rosary54_v1";
function loadState(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; }
}
function saveState(s){
  try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){}
}
let state = loadState();
if(!state.done) state.done = {};        // { "1":true, ... } day index 완료
if(!state.start) state.start = todayStr(); // 시작 날짜 (yyyy-mm-dd)
if(state.intent===undefined) state.intent = "";

function todayStr(d){
  d = d || new Date();
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDate(str){ const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(str,n){ const dt=parseDate(str); dt.setDate(dt.getDate()+n); return todayStr(dt); }
function daysBetween(a,b){ return Math.round((parseDate(b)-parseDate(a))/86400000); }

/* 각 날의 정보 */
function dayPhase(i){ return i<=27 ? "청원" : "감사"; }          // 1..27 청원, 28..54 감사
function dayMystery(i){ return WEEKDAY_MYSTERY[parseDate(dayDate(i)).getDay()]; }
function dayNovena(i){ // 몇 번째 9일기도인지
  return Math.floor((i-1)/9)+1;
}
function dayDate(i){ return addDays(state.start, i-1); }        // i일차의 달력 날짜
function currentExpectedDay(){                                  // 오늘이 며칠차인지
  const diff = daysBetween(state.start, todayStr());
  return diff+1; // 1-based
}

/* =========================================================
   렌더링
   ========================================================= */
const $ = s=>document.querySelector(s);

function render(){
  const doneCount = Object.values(state.done).filter(Boolean).length;
  $("#doneCount").textContent = doneCount;
  $("#progFill").style.width = (doneCount/54*100)+"%";

  // 단계 pill
  let pill = "시작 전";
  if(doneCount>=54) pill = "완주 🎉";
  else if(doneCount>=27) pill = "감사 기도";
  else if(doneCount>0) pill = "청원 기도";
  $("#phasePill").textContent = pill;

  // 시작 날짜 input
  $("#startDate").value = state.start;
  $("#intentBox").value = state.intent || "";

  renderTodayInfo();
  renderCalendar();
}

function renderTodayInfo(){
  const box = $("#todayInfo");
  const doneCount = Object.values(state.done).filter(Boolean).length;
  if(doneCount>=54){
    box.innerHTML = `<div class="done-badge">54일 묵주기도를 모두 마치셨습니다! 🎉<br>주님의 은총과 성모님의 전구에 감사드립니다.</div>`;
    $("#startBtn").textContent = "기도문 다시 보기";
    $("#startNote").textContent = "";
    return;
  }
  let d = currentExpectedDay();
  if(d<1) d=1;
  if(d>54) d=54;
  // 오늘 이미 완료했는지
  const todayDone = !!state.done[d] && dayDate(d)===todayStr();
  const my = MYSTERIES[dayMystery(d)];
  const phase = dayPhase(d);
  const nov = dayNovena(d);
  const novInPhase = ((nov-1)%3)+1;
  box.innerHTML = `
    <div style="font-size:13px;color:var(--muted);font-weight:700">${phase} 기도 · ${novInPhase}번째 9일기도</div>
    <div style="font-size:22px;font-weight:800;margin:2px 0 4px">제 ${d} 일</div>
    <div style="font-size:15px"><b style="color:var(--primary)">${my.name}</b> · ${dayDate(d)} (${WEEKDAY_KR[parseDate(dayDate(d)).getDay()]})</div>
  `;
  if(todayDone){
    $("#startBtn").textContent = "오늘 기도 다시 보기 ✓";
    $("#startNote").innerHTML = `<span style="color:var(--done);font-weight:700">오늘 기도를 마쳤습니다 🙏</span>`;
  }else{
    $("#startBtn").textContent = "오늘의 기도 시작 🙏";
    $("#startNote").textContent = "";
  }
}

function renderCalendar(){
  const cal = $("#calendar");
  cal.innerHTML = "";
  const today = todayStr();
  const expected = currentExpectedDay();

  const groups = [
    {label:"청원 · 1번째 9일기도 (1–9일)", from:1, to:9, phase:"petition"},
    {label:"청원 · 2번째 9일기도 (10–18일)", from:10, to:18, phase:"petition"},
    {label:"청원 · 3번째 9일기도 (19–27일)", from:19, to:27, phase:"petition"},
    {label:"감사 · 1번째 9일기도 (28–36일)", from:28, to:36, phase:"thanks"},
    {label:"감사 · 2번째 9일기도 (37–45일)", from:37, to:45, phase:"thanks"},
    {label:"감사 · 3번째 9일기도 (46–54일)", from:46, to:54, phase:"thanks"},
  ];

  groups.forEach((g,gi)=>{
    const lbl = document.createElement("div");
    lbl.className = "grp-label"+(gi===0?" first":"");
    lbl.textContent = g.label;
    lbl.style.color = g.phase==="thanks" ? "var(--thanks)" : "var(--primary)";
    cal.appendChild(lbl);

    const grid = document.createElement("div");
    grid.className = "grid"+(g.phase==="thanks"?" thankscol":"");
    for(let i=g.from;i<=g.to;i++){
      const cell = document.createElement("div");
      cell.className = "cell";
      const dDate = dayDate(i);
      const isDone = !!state.done[i];
      const isToday = dDate===today;
      const isPast = daysBetween(dDate,today)>0; // dDate < today

      if(isDone){ cell.classList.add("done"); }
      else if(isPast){ cell.classList.add("miss"); }
      else if(!isToday){ cell.classList.add("future"); }
      if(isToday) cell.classList.add("today");

      let mk = "";
      if(isDone) mk = "✓";
      else if(isPast) mk = "✕";
      else if(isToday) mk = "★";
      cell.innerHTML = `<span>${i}</span><span class="mk">${mk}</span>`;
      cell.title = dDate;
      cell.addEventListener("click", ()=>toggleDay(i));
      grid.appendChild(cell);
    }
    cal.appendChild(grid);
  });
}

/* =========================================================
   동작
   ========================================================= */
function toggleDay(i){
  state.done[i] = !state.done[i];
  saveState(state);
  render();
  showToast(state.done[i] ? `제 ${i}일 완료로 표시했어요 ✓` : `제 ${i}일 완료를 취소했어요`);
}

function markTodayDone(){
  let d = currentExpectedDay();
  if(d<1) d=1; if(d>54) d=54;
  state.done[d] = true;
  saveState(state);
  render();
}

let toastTimer;
function showToast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1900);
}

/* =========================================================
   기도 시트
   ========================================================= */
function pickVerse(){ return VERSES[Math.floor(Math.random()*VERSES.length)]; }

function buildSheet(){
  let d = currentExpectedDay();
  if(d<1) d=1; if(d>54) d=54;
  const phase = dayPhase(d);
  const nov = dayNovena(d);
  const novInPhase = ((nov-1)%3)+1;
  const mk = dayMystery(d);
  const my = MYSTERIES[mk];

  $("#sheetPhase").textContent = `${phase} 기도 · ${novInPhase}번째 9일기도`;
  $("#sheetDay").textContent = `제 ${d} 일`;

  const [vtext,vref] = pickVerse();
  const intent = (state.intent||"").trim();
  const isDoneToday = !!state.done[d] && dayDate(d)===todayStr();

  const body = $("#sheetBody");
  body.innerHTML = `
    <div class="verse">
      <span class="q">&ldquo;</span>
      <p id="verseText">${vtext}</p>
      <div class="ref" id="verseRef">${vref}</div>
      <button class="again" id="verseAgain">다른 구절 보기 ↻</button>
    </div>

    ${intent ? `<div class="step"><div class="k">나의 지향</div><div class="txt">${escapeHtml(intent)}</div></div>` : ``}

    <div class="step"><div class="k">시작</div>
      <div class="txt pray">먼저 십자가를 잡고 성호를 그으며 바칩니다.\n\n<b>성호경</b>\n${PRAYERS.sign}\n\n<b>사도신경</b>\n${PRAYERS.creed}</div>
    </div>

    <div class="step"><div class="k">준비 기도 <span class="beads">(큰 알 1 · 작은 알 3)</span></div>
      <div class="txt pray"><b>주님의 기도</b> 1번\n${PRAYERS.our}\n\n<b>성모송</b> 3번 (믿음·희망·사랑을 청하며)\n${PRAYERS.hail}\n\n<b>영광송</b>\n${PRAYERS.glory}</div>
    </div>

    <div class="step">
      <div class="k">${my.name} · 오늘의 묵상</div>
      <div class="txt" style="color:var(--muted);font-size:13px;margin-bottom:4px">각 단마다 → 주님의 기도 1번 · 성모송 10번 · 영광송 · 구원송</div>
      <ul class="myst-list">
        ${my.items.map((d,idx)=>`
          <li class="myst-item">
            <div class="mi-head"><b>제${idx+1}단</b><span>${d.t}</span></div>
            <div class="mi-medit"><span class="mi-ref">${d.ref}</span>${d.m}</div>
          </li>`).join("")}
      </ul>
    </div>

    <div class="step accordion" id="acc1">
      <div class="k">각 단에서 바치는 기도 <span class="chev">⌄</span></div>
      <div class="txt pray"><b>주님의 기도</b>\n${PRAYERS.our}\n\n<b>성모송</b> (10번)\n${PRAYERS.hail}\n\n<b>영광송</b>\n${PRAYERS.glory}\n\n<b>구원을 비는 기도</b>\n${PRAYERS.salvation}</div>
    </div>

    <div class="step accordion" id="acc2">
      <div class="k">마침 기도 <span class="chev">⌄</span></div>
      <div class="txt pray">다섯 단을 마친 후 성모송가를 바칩니다.\n\n<b>성모송가</b>\n${PRAYERS.hailQueen}\n\n<b>성호경</b>\n${PRAYERS.sign}</div>
    </div>

    <div class="finish">
      ${isDoneToday
        ? `<div class="done-badge">오늘 기도를 마치셨습니다 🙏</div>
           <button class="btn btn-outline" id="undoBtn" style="margin-top:8px">완료 취소</button>`
        : `<button class="btn btn-done" id="finishBtn">오늘 기도 완료 ✓</button>`}
      <div class="muted-note">완료하면 오늘 날짜(제${d}일)가 달력에 ✓로 기록됩니다.</div>
    </div>
  `;

  // 이벤트
  $("#verseAgain").onclick = ()=>{
    const [t,r]=pickVerse();
    $("#verseText").textContent=t; $("#verseRef").textContent=r;
  };
  document.querySelectorAll(".accordion .k").forEach(k=>{
    k.onclick = ()=>k.parentElement.classList.toggle("open");
  });
  const fb=$("#finishBtn");
  if(fb) fb.onclick = ()=>{ markTodayDone(); showToast("오늘 기도를 완료했습니다 🙏"); closeSheet(); };
  const ub=$("#undoBtn");
  if(ub) ub.onclick = ()=>{ let dd=currentExpectedDay(); if(dd<1)dd=1;if(dd>54)dd=54; state.done[dd]=false; saveState(state); render(); closeSheet(); };
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function openSheet(){ buildSheet(); $("#overlay").classList.add("open"); $("#sheet").classList.add("open"); document.body.style.overflow="hidden"; }
function closeSheet(){ $("#overlay").classList.remove("open"); $("#sheet").classList.remove("open"); document.body.style.overflow=""; }

/* =========================================================
   이벤트 바인딩
   ========================================================= */
$("#startBtn").onclick = openSheet;
$("#closeSheet").onclick = closeSheet;
$("#overlay").onclick = closeSheet;

$("#intentBox").addEventListener("input", e=>{ state.intent=e.target.value; saveState(state); });

$("#startDate").addEventListener("change", e=>{
  if(e.target.value){ state.start=e.target.value; saveState(state); render(); showToast("시작 날짜를 변경했어요"); }
});

$("#resetBtn").onclick = ()=>{
  if(confirm("모든 기록을 지우고 처음부터 다시 시작할까요?")){
    state = {done:{}, start:todayStr(), intent:state.intent||""};
    saveState(state); render();
    showToast("새로운 54일 기도를 시작합니다 🙏");
  }
};

render();
</script>
</body>
</html>
